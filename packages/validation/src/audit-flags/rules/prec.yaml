family:
  code: PREC
  name: precisionHygiene
  display_name: Precision Hygiene
  description: "Over-precise numbers suggesting false accuracy"
  primary_persona: "QA, CTO"

rules:
  - id: "001"
    name: confidenceOverPrecision
    display_name: Confidence Over Precision
    description: "Over-precise confidence value with more than 1 decimal"
    type: pattern
    mode: presence
    sections: []
    detect:
      - pattern: '(?<!\d)0\.\d{2,}(?!\d)'
        description: multi-decimal fraction
      - pattern: '(?i)confidence[:\s]+(?:0\.\d{2,}|\d{2}\.\d+%)'
        description: precise confidence value
    suppress:
      - pattern: '(?i)(?:calibration|calibrated|Platt\s+scaling|isotonic\s+regression)'
        scope: any_section
        description: calibration methodology present
      - pattern: '(?i)(?:ordinal\s+score|relative\s+ranking)'
        scope: nearby_lines_3
        description: ordinal context
    claim_count: detect_matches
    suggested_action: "Round confidence to 1 decimal or document calibration methodology"
    test_fixtures:
      should_flag:
        - section: testing
          content: "Confidence: 0.8723"
      should_pass:
        - section: testing
          content: "Confidence: 0.87 (Platt scaling calibrated)"

  - id: "002"
    name: costCentsPrecision
    display_name: Cost Cents Precision
    description: "Cents precision on projected cost"
    type: pattern
    mode: presence
    sections: []
    detect:
      - pattern: '\$[\d,]+\.\d{2}'
        description: dollar with cents
    suppress:
      - pattern: '(?i)(?:invoiced|billed|actual\s+cost|AWS\s+bill)'
        scope: nearby_lines_5
        description: actual cost context
      - pattern: '(?i)(?:pricing\s+tier|list\s+price)'
        scope: nearby_lines_3
        description: list price context
    claim_count: detect_matches
    suggested_action: "Use rounded estimates for projected costs"
    test_fixtures:
      should_flag:
        - section: overview
          content: "Estimated infrastructure cost: $1,234.56 per month"
      should_pass:
        - section: overview
          content: "AWS bill (Jan 2026): $1,234.56"

  - id: "003"
    name: exactDeltaOnProjected
    display_name: Exact Delta On Projected
    description: "Exact percentage on model-projected data"
    type: pattern
    mode: presence
    sections: []
    detect:
      - pattern: '[+-]\d+(?:\.\d+)?%'
        description: exact delta percentage
    suppress:
      - pattern: '(?i)(?:\d+-\d+%|approximately|~|roughly)'
        scope: same_row
        description: range or approximation
      - pattern: '(?i)(?:measured|observed|actual|recorded)'
        scope: nearby_lines_3
        description: measured data
    claim_count: detect_matches
    suggested_action: "Use ranges or add ~approximately for projected deltas"
    test_fixtures:
      should_flag:
        - section: overview
          content: "Projected savings of +23.7%"
      should_pass:
        - section: overview
          content: "Measured improvement of +23.7% (observed in production)"

  - id: "004"
    name: roundNumberClustering
    display_name: Round Number Clustering
    description: "All story points are round multiples — suspicious uniformity"
    type: algorithmic
    sections: []
    pipeline:
      - op: extract
        pattern: '(?i)(?:^|\|)\s*(\d+)\s*(?:SP|story\s+points?|points?)\s*(?:\||$)'
        capture: [value]
        into: sp_values
      - op: count
        from: sp_values
        into: sp_count
      - op: flag_if
        condition: "sp_count >= 5"
        finding: "All {sp_count} story point values may be round-number clustered"
    suggested_action: "Review story point estimates — consider if Fibonacci scale was applied"
    test_fixtures:
      should_flag:
        - section: timeline
          content: "| Story 1 | 5 SP |\n| Story 2 | 10 SP |\n| Story 3 | 5 SP |\n| Story 4 | 10 SP |\n| Story 5 | 5 SP |"
      should_pass:
        - section: timeline
          content: "| Story 1 | 3 SP |\n| Story 2 | 8 SP |"
