name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build, test, and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies (frozen)
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run full test suite
        run: pnpm test

      - name: Rebuild and bundle MCP server
        run: pnpm bundle

      - name: Verify mcp-server bundle is current
        run: |
          # Rebuild the bundle and fail if the committed version diverges
          # from the rebuilt one (catches "I forgot to commit dist/" PRs).
          if [ -d packages/mcp-server/dist ]; then
            git diff --exit-code packages/mcp-server/dist/ \
              || (echo "::error::mcp-server bundle out of date — run 'pnpm build' and commit"; exit 1)
          fi

      - name: Assemble .mcpb staging directory
        run: |
          set -euo pipefail
          STAGE_DIR="$(mktemp -d)/prd-spec-generator-mcpb"
          mkdir -p "${STAGE_DIR}/mcp-server"
          mkdir -p "${STAGE_DIR}/packages/skill"
          mkdir -p "${STAGE_DIR}/bin"

          # Core runtime files
          cp manifest.json "${STAGE_DIR}/"
          cp icon.png "${STAGE_DIR}/" 2>/dev/null || true
          cp README.md "${STAGE_DIR}/"
          cp LICENSE "${STAGE_DIR}/"
          cp PRIVACY.md "${STAGE_DIR}/"

          # Bundled server
          cp mcp-server/index.js "${STAGE_DIR}/mcp-server/"
          cp mcp-server/package.json "${STAGE_DIR}/mcp-server/"

          # Runtime dep provisioner
          cp bin/ensure-deps.sh "${STAGE_DIR}/bin/"
          chmod +x "${STAGE_DIR}/bin/ensure-deps.sh"

          # Skill config (required at runtime — PRD_GEN_SKILL_CONFIG)
          cp packages/skill/skill-config.json "${STAGE_DIR}/packages/skill/"

          echo "STAGE_DIR=${STAGE_DIR}" >> "$GITHUB_ENV"
          echo "Staged contents:"
          find "${STAGE_DIR}" -type f

      - name: Pack .mcpb bundle
        run: |
          set -euo pipefail
          OUTFILE="${GITHUB_WORKSPACE}/prd-spec-generator.mcpb"

          # Use @anthropic-ai/mcpb if available, else zip
          if npx -y --yes @anthropic-ai/mcpb@latest pack --help >/dev/null 2>&1; then
            npx -y @anthropic-ai/mcpb@latest pack "${STAGE_DIR}" "${OUTFILE}"
          else
            (cd "${STAGE_DIR}" && zip -r "${OUTFILE}" .)
          fi

          # Compute SHA-256 checksum
          shasum -a 256 "${OUTFILE}" | awk '{print $1}' > "${OUTFILE}.sha256"
          echo "SHA256: $(cat "${OUTFILE}.sha256")"
          echo "MCPB_SHA256=$(cat "${OUTFILE}.sha256")" >> "$GITHUB_ENV"

      - name: Patch server.json with the real .mcpb checksum
        run: |
          set -euo pipefail
          # INVARIANT (see scripts/publish-mcp-registry.sh header): the
          # file_sha256 committed to server.json at release-PR time is a
          # placeholder — JSON has no comment syntax to note this in the
          # file itself — because the real checksum only exists after this
          # job builds the .mcpb above. Patch it here and commit the
          # single-file change back to main in the next step; this closes
          # the loop for the current tag automatically (#23) and leaves
          # publish-mcp-registry.sh as a manual fallback for any tag whose
          # release job didn't run this step (e.g. pre-#23 releases).
          jq --arg sha "${MCPB_SHA256}" '.packages[0].file_sha256 = $sha' server.json > server.json.tmp
          mv server.json.tmp server.json
          jq empty server.json
          echo "Patched file_sha256: $(jq -r '.packages[0].file_sha256' server.json)"

      - name: Commit and push patched server.json to main
        run: |
          set -euo pipefail
          if git diff --quiet -- server.json; then
            echo "server.json already carries the correct checksum; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.json
          git commit -m "chore(release): patch server.json sha256 for ${GITHUB_REF_NAME}"
          # HEAD is the tag commit (detached); fast-forward main to it.
          # If main has diverged since the tag was cut, this push is
          # rejected (non-fast-forward) rather than silently overwriting
          # history — fall back to scripts/publish-mcp-registry.sh in that case.
          git push origin HEAD:refs/heads/main

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the section between [VERSION] and the next [section] heading
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (in_section) exit
              if (index($0, "[" ver "]")) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry found for $VERSION; using tag message" > release-notes.md
          fi
          # Append SHA256 to release notes for auditability
          echo "" >> release-notes.md
          echo "### .mcpb bundle" >> release-notes.md
          echo "SHA-256: \`${MCPB_SHA256}\`" >> release-notes.md

      - name: Create GitHub Release (with .mcpb artifact)
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            prd-spec-generator.mcpb
            prd-spec-generator.mcpb.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
